<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結構解題前置診斷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{--bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--border:#2a2a2a;--border2:#333;--text:#e8e8e8;--text2:#888;--text3:#555;--accent:#c8f04a;--teal:#4af0c8;--amber:#f0a84a;--red:#f04a4a;--blue:#4a9ef0;--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh;display:flex;flex-direction:column}
header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em}
.dot{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;margin-right:7px}
header h1{font-size:13px;font-weight:300;color:var(--text2)}
main{flex:1;display:grid;grid-template-columns:340px 1fr;min-height:0}
.left{border-right:1px solid var(--border);display:flex;flex-direction:column}
.upzone{min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative}
.upzone:hover{background:var(--bg2)}
.upzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.up-ico{width:40px;height:40px;border:1px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;color:var(--text3)}
.up-lbl{font-size:13px;color:var(--text2);text-align:center;line-height:1.6}
.up-sub{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
#pimg{width:100%;max-height:200px;object-fit:contain;display:none;padding:8px}
.lbody{padding:14px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
.ilbl{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.06em;margin-bottom:4px}
textarea{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:12px;font-weight:300;padding:9px 11px;resize:none;outline:none;line-height:1.6;transition:border-color .15s;width:100%;height:72px}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--text3)}
#gbtn{background:var(--accent);color:#0f0f0f;border:none;border-radius:4px;padding:10px;font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s;width:100%}
#gbtn:hover{background:#b0d840}
#gbtn:disabled{opacity:.35;cursor:not-allowed}
.sp{width:12px;height:12px;border:2px solid #0f0f0f;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.right{display:flex;flex-direction:column;overflow:hidden}
.rh{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.rt{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em}
.pill{font-family:var(--mono);font-size:10px;padding:2px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--text3)}
.pill.a{border-color:var(--accent);color:var(--accent)}
.pill.d{border-color:var(--teal);color:var(--teal)}
.pill.e{border-color:var(--red);color:var(--red)}
.rb{flex:1;overflow-y:auto;padding:20px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.idle{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3)}
.idle svg{width:26px;height:26px;opacity:.2}
.idle p{font-size:12px;text-align:center;line-height:1.9}
.dl{display:none;flex-direction:column;gap:16px}
.dl.on{display:flex}
.dc{border:1px solid var(--border);border-radius:5px;overflow:hidden;animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.dh{padding:8px 13px;display:flex;align-items:center;gap:8px;background:var(--bg2);border-bottom:1px solid var(--border)}
.dn{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:18px}
.dt{font-size:12px;font-weight:500;flex:1}
.db{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid}
.bok{border-color:var(--teal);color:var(--teal)}
.bwarn{border-color:var(--amber);color:var(--amber)}
.berr{border-color:var(--red);color:var(--red)}
.binfo{border-color:var(--blue);color:var(--blue)}
.dbody{padding:13px 15px}
.dv{font-size:12px;line-height:1.8;color:var(--text)}
.hi{color:var(--accent);font-weight:500}
.fm{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px 12px;font-family:var(--mono);font-size:11px;color:var(--accent);margin-top:8px;line-height:1.9}
.cl{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.ci{display:flex;align-items:flex-start;gap:6px;font-size:11px;line-height:1.6}
.cico{width:12px;height:12px;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:8px}
.cico.ok{background:rgba(74,240,200,.1);color:var(--teal)}
.cico.w{background:rgba(240,168,74,.1);color:var(--amber)}
.cico.e{background:rgba(240,74,74,.1);color:var(--red)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.mc{padding:8px 10px;border-radius:4px;border:1px solid var(--border);font-size:11px;line-height:1.6;cursor:pointer;transition:border-color .12s,background .12s}
.mc:hover{border-color:var(--border2);background:var(--bg2)}
.mc.sel{border-color:var(--accent);background:rgba(200,240,74,.04)}
.mcn{font-weight:500;margin-bottom:2px}
.mcd{color:var(--text2);font-size:10px}
.wb{background:rgba(240,168,74,.06);border:1px solid rgba(240,168,74,.22);border-radius:4px;padding:8px 12px;font-size:11px;color:var(--amber);line-height:1.7;margin-top:9px;display:none}
.wb.on{display:block}
.pp{display:none;border:1px solid var(--accent);border-radius:5px;overflow:hidden;margin-top:4px}
.pp.on{display:block}
.pph{background:rgba(200,240,74,.06);padding:9px 13px;border-bottom:1px solid rgba(200,240,74,.16);font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.07em;display:flex;align-items:center;gap:6px}
.ppb{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ppi{display:flex;flex-direction:column;gap:2px}
.ppl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.05em}
.ppv{font-size:12px;color:var(--text)}
.ppv.acc{color:var(--accent);font-weight:500}
.procbtn{width:100%;margin-top:12px;background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:4px;padding:10px;font-size:12px;font-family:var(--sans);cursor:pointer;transition:background .14s;display:none;align-items:center;justify-content:center;gap:6px}
.procbtn:hover{background:rgba(200,240,74,.06)}
.action-status{display:none;border:1px solid var(--border2);border-radius:4px;padding:8px 10px;font-size:11px;line-height:1.6}
.action-status.warn{display:block;color:var(--amber);background:rgba(240,168,74,.06);border-color:rgba(240,168,74,.22)}
.action-status.error{display:block;color:var(--red);background:rgba(240,74,74,.06);border-color:rgba(240,74,74,.22)}
@media(max-width:640px){main{grid-template-columns:1fr}.left{border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="dot"></span>struct.dx</div>
  <h1>解題前置診斷模組 — pre-analysis diagnostic</h1>
</header>
<main>
  <div class="left">
    <div class="upzone" id="uz">
      <input type="file" id="fi" accept="image/*,application/pdf,.pdf">
      <div id="uph">
        <div class="up-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>
        <div class="up-lbl">上傳結構圖片或 PDF</div>
        <div class="up-sub">PNG / JPG / PDF — 點擊或拖曳</div>
      </div>
      <img id="pimg" alt="preview">
      <div id="pfile" style="display:none;padding:24px 16px;text-align:center;font-family:ui-monospace,Menlo,Consolas,monospace">
        <div style="font-size:28px;margin-bottom:8px">📄</div>
        <div id="pfile-name" style="font-size:12px;color:var(--text);word-break:break-all;margin-bottom:4px"></div>
        <div id="pfile-meta" style="font-size:10px;color:var(--text3)"></div>
      </div>
    </div>
    <div class="lbody">
      <div>
        <div class="ilbl">補充說明（選填）</div>
        <textarea id="extra" placeholder="例：EI=20000 kN·m²，D沉陷3mm，求使E點垂直位移=0的水平力P…"></textarea>
      </div>
      <button id="gbtn" disabled onclick="go()">
        <div class="sp" id="sp"></div>
        <svg id="bi" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        開始前置診斷
      </button>
      <div class="action-status" id="actionStatus" role="status" aria-live="polite"></div>
    </div>
  </div>
  <div class="right">
    <div class="rh">
      <div class="rt">診斷報告 — DIAGNOSTIC REPORT</div>
      <div class="pill" id="pill">待機中</div>
    </div>
    <div class="rb">
      <div class="idle" id="idle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <p>上傳結構圖片<br>點擊「開始前置診斷」<br>AI 完成五項解題前檢核</p>
      </div>
      <div class="dl" id="dl">
        <div class="dc"><div class="dh"><div class="dn">01</div><div class="dt">結構類型識別</div><div class="db binfo" id="b1">分析中</div></div><div class="dbody"><div class="dv" id="v1">—</div></div></div>
        <div class="dc"><div class="dh"><div class="dn">02</div><div class="dt">幾何條件辨識</div><div class="db binfo" id="b2">等待中</div></div><div class="dbody"><div class="dv" id="v2">—</div></div></div>
        <div class="dc"><div class="dh"><div class="dn">03</div><div class="dt">靜不定次數判斷</div><div class="db binfo" id="b3">等待中</div></div><div class="dbody"><div class="dv" id="v3">—</div></div></div>
        <div class="dc"><div class="dh"><div class="dn">04</div><div class="dt">建議解法與關鍵公式</div><div class="db binfo" id="b4">等待中</div></div><div class="dbody"><div class="dv" id="v4">—</div><div class="mg" id="mg"></div></div></div>
        <div class="dc"><div class="dh"><div class="dn">05</div><div class="dt">已知條件 &amp; 注意事項</div><div class="db binfo" id="b5">等待中</div></div><div class="dbody"><div class="dv" id="v5">—</div><div class="wb" id="wb"></div></div></div>
        <div class="pp" id="pp">
          <div class="pph"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8h6M5 5h6M5 11h4"/></svg>解題護照 — SOLUTION PASSPORT</div>
          <div class="ppb" id="ppb"></div>
        </div>
        <button class="procbtn" id="pb" onclick="proceed()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
          確認診斷，進入解題
        </button>
      </div>
    </div>
  </div>
</main>
<script>
const API_BASE='http://localhost:3000';
let i64=null,itp=null,res=null;
const fi=document.getElementById('fi');
const pimg=document.getElementById('pimg');
const uph=document.getElementById('uph');
const gbtn=document.getElementById('gbtn');
function setActionStatus(message,tone='warn'){
  const el=document.getElementById('actionStatus');
  if(!el)return;
  el.textContent=message||'';
  el.className=`action-status${message?` ${tone}`:''}`;
}

function isAcc(f){return f&&(f.type.startsWith('image/')||f.type==='application/pdf'||/\.pdf$/i.test(f.name||''))}
fi.addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  if(!isAcc(f)){setActionStatus('僅支援圖片（PNG/JPG）或 PDF','error');return}
  setActionStatus('');
  const r=new FileReader();
  r.onload=ev=>{
    i64=ev.target.result.split(',')[1];
    itp=ev.target.result.split(';')[0].split(':')[1];
    if(/\.pdf$/i.test(f.name)&&itp!=='application/pdf')itp='application/pdf';
    const isPdf=itp==='application/pdf';
    const pfile=document.getElementById('pfile');
    if(isPdf){
      pimg.style.display='none';
      pfile.style.display='block';
      document.getElementById('pfile-name').textContent=f.name;
      document.getElementById('pfile-meta').textContent=`PDF · ${(f.size/1024).toFixed(1)} KB`;
    }else{
      pfile.style.display='none';
      pimg.src=ev.target.result;pimg.style.display='block';
    }
    uph.style.display='none';gbtn.disabled=false;
  };r.readAsDataURL(f);
});
const uz=document.getElementById('uz');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.style.background='#1a1a1a'});
uz.addEventListener('dragleave',()=>uz.style.background='');
uz.addEventListener('drop',e=>{
  e.preventDefault();uz.style.background='';
  const f=e.dataTransfer.files[0];
  if(isAcc(f)){const dt=new DataTransfer();dt.items.add(f);fi.files=dt.files;fi.dispatchEvent(new Event('change'))}
  else setActionStatus('僅支援圖片（PNG/JPG）或 PDF','error');
});

function pill(t,c){const p=document.getElementById('pill');p.textContent=t;p.className='pill '+(c||'')}
function badge(i,t,c){const e=document.getElementById('b'+i);e.textContent=t;e.className='db '+c}
function val(i,h){document.getElementById('v'+i).innerHTML=h}
function bc(b){return b==='ok'?'bok':b==='warn'?'bwarn':'berr'}
function bt(b){return b==='ok'?'正常':b==='warn'?'注意':'警告'}

async function go(){
  if(!i64)return;
  const extra=document.getElementById('extra').value.trim();
  gbtn.disabled=true;document.getElementById('sp').style.display='block';document.getElementById('bi').style.display='none';
  pill('分析中','a');
  document.getElementById('idle').style.display='none';
  document.getElementById('dl').classList.add('on');
  document.getElementById('pp').classList.remove('on');
  document.getElementById('pb').style.display='none';
  document.getElementById('wb').classList.remove('on');
  for(let i=1;i<=5;i++){badge(i,i===1?'分析中':'等待中','binfo');val(i,'—')}

  const sys=`你是結構工程診斷AI，解題前做五項檢核。輸出純JSON不含markdown：
{"d1":{"type":"結構類型","subtype":"子類型","badge":"ok/warn/err","confidence":"高/中/低"},
"d2":{"nodes":["A(0,0)鉸支"],"members":["AB(L=8m)"],"loads":["B點↓30kN"],"badge":"ok/warn"},
"d3":{"formula":"m+r vs 2j或3m+r vs 3j","calc":"m=6,r=3,9 vs 8","degree":數字,"verdict":"靜定或N次靜不定","badge":"ok/warn/err"},
"d4":{"recommended":"建議解法","reason":"原因一句","methods":[{"name":"法名","desc":"適用條件","suitable":true}],"key_formula":"關鍵公式","fem_formula":"固端彎矩公式與邊界條件","badge":"ok"},
"d5":{"known":["EI=20000"],"missing":[],"warnings":["注意：A鉸支用wL²/8非wL²/12"],"badge":"ok/warn/err"},
"passport":{"type":"結構類型","degree":"靜定或N次靜不定","method":"建議解法","unknowns":"θ_B、θ_C","equations":"2個平衡方程","key_warning":"最重要提醒或null"}}
補充：${extra||'無'}`;

  try{
    const rsp=await fetch(`${API_BASE}/api/diagnose`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_base64:i64,image_type:itp,extra})});
    const json=await rsp.json();
    if(!json.success)throw new Error(json.error||'diagnose failed');
    res=json.data;
    render(res);pill('診斷完成','d');
  }catch(e){
    pill('失敗','e');
    const msg=(e&&e.message)||String(e);
    let hint='';
    if(/Failed to fetch|NetworkError|TypeError/.test(msg)){
      hint='<br><span style="color:var(--text3);font-size:11px">→ 後端未啟動或無法連線<br>請確認：<br>&nbsp;&nbsp;1. 已執行 <code>cd backend && node server.js</code><br>&nbsp;&nbsp;2. 看得到「running on http://localhost:3000」訊息<br>&nbsp;&nbsp;3. 不是用 file:// 開啟此頁（建議 <code>python -m http.server</code>）</span>';
    }else if(/API key|x-api-key|401|authentication/i.test(msg)){
      hint='<br><span style="color:var(--text3);font-size:11px">→ ANTHROPIC_API_KEY 未設定或無效<br>&nbsp;&nbsp;<code>set ANTHROPIC_API_KEY=sk-ant-...</code> 後重啟後端</span>';
    }else if(/JSON|parse|Unexpected token/i.test(msg)){
      hint='<br><span style="color:var(--text3);font-size:11px">→ AI 回傳格式異常，可能是圖片太模糊或 PDF 頁數過多，請重試或換更清晰的圖</span>';
    }
    val(1,`<span style="color:var(--red)">解析失敗：${msg}</span>${hint}`);
    for(let i=1;i<=5;i++)badge(i,'失敗','berr');
    console.error(e);
  }
  gbtn.disabled=false;document.getElementById('sp').style.display='none';document.getElementById('bi').style.display='block';
}

function render(r){
  setTimeout(()=>{badge(1,bt(r.d1.badge),bc(r.d1.badge));val(1,`<span class="hi">${r.d1.type}</span>　<span style="color:var(--text2)">${r.d1.subtype}</span><br><span style="font-size:11px;color:var(--text3)">信心度：${r.d1.confidence}</span>`)},200);
  setTimeout(()=>{
    badge(2,bt(r.d2.badge),bc(r.d2.badge));
    const n=r.d2.nodes.map(x=>`<div class="ci"><div class="cico ok">✓</div><div>${x}</div></div>`).join('');
    const m=r.d2.members.map(x=>`<div class="ci"><div class="cico ok">✓</div><div>${x}</div></div>`).join('');
    const l=r.d2.loads.map(x=>`<div class="ci"><div class="cico w">!</div><div>${x}</div></div>`).join('');
    val(2,`<div style="margin-bottom:8px"><div class="ilbl" style="margin-bottom:4px">NODES</div><div class="cl">${n}</div></div><div style="margin-bottom:8px"><div class="ilbl" style="margin-bottom:4px">MEMBERS</div><div class="cl">${m}</div></div><div><div class="ilbl" style="margin-bottom:4px">LOADS</div><div class="cl">${l}</div></div>`);
  },600);
  setTimeout(()=>{
    const deg=r.d3.degree;
    badge(3,deg===0?'靜定':`${deg}次靜不定`,deg===0?'bok':deg<=2?'bwarn':'berr');
    val(3,`<div style="font-size:11px;color:var(--text2);margin-bottom:6px">公式：${r.d3.formula}</div><div class="fm">${r.d3.calc}<br>→ <span style="color:${deg===0?'var(--teal)':'var(--amber)'}">${r.d3.verdict}</span></div>`);
  },1000);
  setTimeout(()=>{
    badge(4,bt(r.d4.badge),bc(r.d4.badge));
    val(4,`<div style="margin-bottom:8px">建議：<span class="hi">${r.d4.recommended}</span><br><span style="font-size:11px;color:var(--text2)">${r.d4.reason}</span></div><div class="ilbl" style="margin-bottom:4px">KEY FORMULA</div><div class="fm">${r.d4.key_formula}<br><br>固端彎矩：${r.d4.fem_formula}</div>`);
    document.getElementById('mg').innerHTML=r.d4.methods.map(m=>`<div class="mc ${m.suitable?'sel':''}" onclick="selM(this)"><div class="mcn" style="color:${m.suitable?'var(--accent)':'var(--text2)'}">${m.name}</div><div class="mcd">${m.desc}</div></div>`).join('');
  },1400);
  setTimeout(()=>{
    badge(5,bt(r.d5.badge),bc(r.d5.badge));
    const k=r.d5.known.map(x=>`<div class="ci"><div class="cico ok">✓</div><div>${x}</div></div>`).join('');
    const ms=r.d5.missing.map(x=>`<div class="ci"><div class="cico e">✗</div><div style="color:var(--text2)">${x}</div></div>`).join('');
    val(5,`<div style="margin-bottom:${ms?'8px':'0'}"><div class="ilbl" style="margin-bottom:4px">已知</div><div class="cl">${k}</div></div>${ms?`<div><div class="ilbl" style="margin-bottom:4px">缺少</div><div class="cl">${ms}</div></div>`:''}`);
    if(r.d5.warnings&&r.d5.warnings.length){const wb=document.getElementById('wb');wb.innerHTML='⚠ '+r.d5.warnings.join('<br>⚠ ');wb.classList.add('on');}
  },1800);
  setTimeout(()=>{
    const pp=r.passport;
    document.getElementById('ppb').innerHTML=`<div class="ppi"><div class="ppl">STRUCT TYPE</div><div class="ppv acc">${pp.type}</div></div><div class="ppi"><div class="ppl">INDETERMINACY</div><div class="ppv acc">${pp.degree}</div></div><div class="ppi"><div class="ppl">METHOD</div><div class="ppv">${pp.method}</div></div><div class="ppi"><div class="ppl">UNKNOWNS</div><div class="ppv">${pp.unknowns}</div></div><div class="ppi"><div class="ppl">EQUATIONS</div><div class="ppv">${pp.equations}</div></div><div class="ppi"><div class="ppl">KEY WARNING</div><div class="ppv" style="color:var(--amber)">${pp.key_warning||'—'}</div></div>`;
    document.getElementById('pp').classList.add('on');
    document.getElementById('pb').style.display='flex';
  },2200);
}
function selM(el){document.querySelectorAll('.mc').forEach(c=>c.classList.remove('sel'));el.classList.add('sel')}
function proceed(){
  if(!res){setActionStatus('尚未完成診斷','warn');return}
  // 把整份診斷存到 localStorage，讓 verify_engine.html 讀取自動帶入
  try{
    localStorage.setItem('structdx_pending_diag', JSON.stringify({
      ts: Date.now(),
      diag: res
    }));
  }catch(e){console.warn('localStorage 寫入失敗',e)}
  // 嘗試同時複製到剪貼簿（可選，失敗不影響跳轉）
  const pp=res.passport;
  const txt=`【解題護照】\n類型：${pp.type}\n靜不定：${pp.degree}\n解法：${pp.method}\n未知數：${pp.unknowns}\n方程組：${pp.equations}\n重要提醒：${pp.key_warning||'無'}`;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).catch(()=>{});
  }
  // 跳轉到驗算頁
  window.location.href='verify_engine.html';
}
</script>
