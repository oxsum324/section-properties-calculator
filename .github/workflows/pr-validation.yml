name: PR validation

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quick-preflight:
    name: Quick preflight
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Run quick preflight
        shell: cmd
        run: call run-preflight-tools-quick.bat

      - name: Upload preflight evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pr-preflight-${{ github.run_id }}
          path: |
            output/preflight/preflight-summary.md
            output/preflight/preflight-summary.json
            output/preflight/history/
          if-no-files-found: warn
          retention-days: 7
