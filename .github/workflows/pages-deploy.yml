name: Pages deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Stage static site
        run: |
          set -euo pipefail
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='_site/' \
            --exclude='README.md' \
            --exclude='STAGING_GROUPS.md' \
            --exclude='TOOL_BOUNDARIES.md' \
            --exclude='TOOL_REPORT_GUIDE.md' \
            --exclude='*.ps1' \
            --exclude='*.bat' \
            --exclude='*.test.js' \
            --exclude='*.contract.test.js' \
            --exclude='*.md' \
            --exclude='**/*.ps1' \
            --exclude='**/*.bat' \
            --exclude='**/*.test.js' \
            --exclude='**/*.contract.test.js' \
            --exclude='**/*.md' \
            ./ _site/
          touch _site/.nojekyll

      - name: Archive GitHub Pages artifact
        run: |
          set -euo pipefail
          tar \
            --dereference --hard-dereference \
            --directory _site \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  live-smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run live Pages smoke
        env:
          PAGES_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: node "結構工具箱/tools/pages-live-smoke.js" --check-private-boundary
