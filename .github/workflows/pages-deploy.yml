name: Pages deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify clean source checkout
        run: test -z "$(git status --porcelain --untracked-files=all)"

      - name: Stage static site
        run: |
          set -euo pipefail
          node "結構工具箱/tools/build-pages-artifact.js" --repo-root "." --site-root "_site"
          node "結構工具箱/tools/build-pages-clean-routes.js" --site-root "_site" --config "vercel.json"
          touch _site/.nojekyll
          node "結構工具箱/tools/build-pages-deployment-manifest.js" \
            --site-root "_site" \
            --commit-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --source-dirty "false" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT"

      - name: Verify staged Pages artifact
        run: |
          set -euo pipefail
          base_url="http://127.0.0.1:4173/"
          server_log="$RUNNER_TEMP/pages-staged-server.log"
          python3 -m http.server 4173 --bind 127.0.0.1 --directory _site >"$server_log" 2>&1 &
          server_pid=$!
          cleanup_server() {
            kill "$server_pid" >/dev/null 2>&1 || true
            wait "$server_pid" >/dev/null 2>&1 || true
          }
          trap cleanup_server EXIT

          ready=false
          for _ in {1..40}; do
            if curl --fail --silent --show-error --output /dev/null "$base_url"; then
              ready=true
              break
            fi
            sleep 0.25
          done
          if [[ "$ready" != true ]]; then
            cat "$server_log"
            exit 1
          fi

          node "結構工具箱/tools/pages-live-smoke.js" \
            --base-url "$base_url" \
            --check-private-boundary \
            --expected-commit-sha "$GITHUB_SHA" \
            --expected-run-id "$GITHUB_RUN_ID" \
            --expect-clean-source
          bash "結構工具箱/tools/run-pages-browser-smoke.sh" "$base_url" "pages-staged-browser"

      - name: Archive GitHub Pages artifact
        run: |
          set -euo pipefail
          tar \
            --dereference --hard-dereference \
            --directory _site \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  live-smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run live Pages smoke
        env:
          PAGES_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          PAGES_EXPECTED_COMMIT_SHA: ${{ github.sha }}
          PAGES_EXPECTED_RUN_ID: ${{ github.run_id }}
          PAGES_EXPECT_CLEAN_SOURCE: 1
        run: node "結構工具箱/tools/pages-live-smoke.js" --check-private-boundary

      - name: Run live Pages browser smoke
        env:
          PAGES_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          PAGES_BROWSER_SMOKE_ATTEMPTS: 2
          PAGES_BROWSER_SMOKE_RETRY_DELAY_SECONDS: 5
        run: bash "結構工具箱/tools/run-pages-browser-smoke.sh" "$PAGES_BASE_URL" "pages-live-browser"
