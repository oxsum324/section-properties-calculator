name: Pages live smoke

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  pages-live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Node version
        run: node --version

      - name: Wait for GitHub Pages deployment
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            record="$(gh run list --workflow pages-build-deployment --branch master --limit 20 --json databaseId,headSha,status,conclusion \
              --jq '.[] | select(.headSha == env.HEAD_SHA) | [.databaseId, .status, (.conclusion // "")] | @tsv' | head -n 1 || true)"
            if [ -z "$record" ]; then
              echo "Waiting for pages-build-deployment for ${HEAD_SHA} (attempt ${attempt}/90)"
              sleep 10
              continue
            fi
            IFS=$'\t' read -r run_id status conclusion <<< "$record"
            echo "Pages run ${run_id}: status=${status} conclusion=${conclusion:-pending}"
            if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
              exit 0
            fi
            if [ "$status" = "completed" ]; then
              echo "Pages deployment failed for ${HEAD_SHA}: conclusion=${conclusion}"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for pages-build-deployment for ${HEAD_SHA}"
          exit 1

      - name: Run live Pages smoke
        env:
          PAGES_BASE_URL: https://oxsum324.github.io/section-properties-calculator/
        run: node "結構工具箱/tools/pages-live-smoke.js"
