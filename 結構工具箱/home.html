<body>

<!-- HEADER -->
<header class="site-header">
  <div class="wrap">
    <div class="site-header__bar">
      <div class="brand">

      </div>

      <div class="site-header__meta">
        <span>版本</span>
        <span class="mono">v2.0 · 2026-06</span>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="wrap">
      <div class="hero__inner">
        <div>
          <p class="eyebrow">公司內部工程工具入口</p>
          <hr class="red-rule">
          <h1><b>結構工具箱</b><em>弘一工程顧問</em></h1>
        </div>
        <div class="hero__status">
          <small>收錄工具</small>
          <strong><span class="num" id="heroToolCount"></span> 項 · <span id="heroCatCount"></span> 類</strong>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- CATEGORY STRIP -->
<section class="section">
  <div class="wrap">
    <div class="section-head">
      <div>
        <p class="eyebrow">Categories</p>
        <h2>力量來源與檢核目的</h2>
      </div>
      <p class="section-head__count">
        顯示 <b class="num" id="visibleCount"></b> 項<span id="activeLabel"></span>
      </p>
    </div>
    <div class="cat-reset">
      <button class="chip" id="chipAll" aria-pressed="true" data-cat="all">全部工具</button>
    </div>
    <div class="cats" id="catGrid"></div>
  </div>
</section>

<!-- WORKSPACE: tool grid + status rail -->
<section class="section">
  <div class="wrap">
    <div class="workspace">
      <div>
        <div class="tool-grid" id="toolGrid"></div>
        <div class="empty" id="emptyState" style="display:none">
          <strong>找不到符合條件的工具</strong>
          <p>請切回「全部」，或改從其他分類進入。</p>
        </div>
      </div>
      <aside class="rail">
        <div class="rail__group">
          <p class="rail__title">Links</p>
          <div class="rail__links" id="railLinks"></div>
        </div>
      </aside>
    </div>
  </div>
</section>

<!-- NOTE -->
<section class="section">
  <div class="wrap">
    <div class="note">
      <strong>使用邊界</strong>
      <p>各工具僅得於頁面標示之適用範圍內使用；超出適用範圍者不得直接採用計算結果。最終結構設計與圖說仍應由執業技師簽證。</p>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="wrap">
    <div class="site-footer__inner">
      <span>弘一工程顧問有限公司　內部工程工具平台</span>
      <span class="mono">HY-TOOLBOX · v2.0</span>
    </div>

</footer>

/* =========================================================================
   渲染邏輯
   ========================================================================= */
var activeCategory = 'all';

function tagHtml(key) {
  var t = TAGS[key] || { label: key, tone: 'navy' };
  return '<span class="tag tag--' + t.tone + '">' + t.label + '</span>';
}

function renderCats() {
  var html = CATEGORIES.map(function(c) {
    var count = TOOLS.filter(function(t) { return t.cat === c.id; }).length;
    var pressed = activeCategory === c.id ? 'true' : 'false';
    return '<button class="cat" aria-pressed="' + pressed + '" data-cat="' + c.id + '">' +
      '<span class="cat__head">' +
        '<i class="cat__icon" data-lucide="' + c.icon + '"></i>' +
        '<span class="cat__en">' + c.en + '</span>' +
      '</span>' +
      '<span class="cat__label">' + c.label + '</span>' +
      '<span class="cat__desc">' + c.desc + '</span>' +
      '<span class="cat__count"><b>' + count + '</b> 項工具</span>' +
    '</button>';
  }).join('');
  document.getElementById('catGrid').innerHTML = html;

  document.querySelectorAll('.cat').forEach(function(btn) {
    btn.addEventListener('click', function() { filterCat(btn.dataset.cat); });
  });
}

function renderTools() {
  var filtered = activeCategory === 'all'
    ? TOOLS
    : TOOLS.filter(function(t) { return t.cat === activeCategory; });

  document.getElementById('visibleCount').textContent = filtered.length;

  var cat = CATEGORIES.find(function(c) { return c.id === activeCategory; });
  document.getElementById('activeLabel').textContent = cat ? ' · ' + cat.label : '';

  var grid = document.getElementById('toolGrid');
  var empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(function(t) {
    return '<a class="tool tk-hit" href="' + t.href + '">' +
      '<div class="tool__top">' +
        '<span class="tool__icon"><i data-lucide="' + t.icon + '"></i></span>' +
        '<span class="tool__code">' + t.code + '</span>' +
        tagHtml(t.tag) +
      '</div>' +
      '<h3 class="tool__name">' + t.name + '</h3>' +
      '<p class="tool__scope">' + t.scope + '</p>' +
      '<div class="tool__go">' +
        '<span>開啟工具</span>' +
        '<i data-lucide="arrow-right"></i>' +
      '</div>' +
    '</a>';
  }).join('');
}

function renderRail() {
  document.getElementById('railLinks').innerHTML = LINKS.map(function(l) {
    return '<a href="' + l.href + '">' +
      '<span>' + l.label + '</span>' +
      '<i data-lucide="arrow-up-right"></i>' +
    '</a>';
  }).join('');
}

function filterCat(id) {
  activeCategory = id;

  document.getElementById('chipAll').setAttribute('aria-pressed', id === 'all' ? 'true' : 'false');
  document.querySelectorAll('.cat').forEach(function(btn) {
    btn.setAttribute('aria-pressed', btn.dataset.cat === id ? 'true' : 'false');
  });

  renderTools();
  if (window.lucide) lucide.createIcons();
}

/* init */
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('heroToolCount').textContent = TOOLS.length;
  document.getElementById('heroCatCount').textContent = CATEGORIES.length;
  document.getElementById('visibleCount').textContent = TOOLS.length;

  renderCats();
  renderTools();
  renderRail();
  if (window.lucide) lucide.createIcons();
});

document.getElementById('chipAll').addEventListener('click', function() { filterCat('all'); });
</script>
